        const REVERSED_RATE = 0.5;

        // ========================================

        // ========================================

        function randomInt(max) {
            if (typeof crypto !== 'undefined' && crypto.getRandomValues) {
                const array = new Uint32Array(1);
                crypto.getRandomValues(array);
                return array[0] % max;
            }
            return Math.floor(Math.random() * max);
        }

        function shuffle(array) {
            const result = [...array];
            for (let i = result.length - 1; i > 0; i--) {
                const j = randomInt(i + 1);
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        function pickUnique(cards, count) {
            const shuffled = shuffle(cards);
            return shuffled.slice(0, count);
        }

        function getOrientation() {
            return Math.random() < REVERSED_RATE ? 'reversed' : 'upright';
        }

        function pickRandomFromArray(arr, count = 1) {
            const shuffled = shuffle(arr);
            return count === 1 ? shuffled[0] : shuffled.slice(0, count);
        }

                description = `${meaning}。目前的狀態呈現出${selectedKeywords[0]}和${selectedKeywords[1]}的特質。`;
            } else if (position.name === '障礙') {
                description = `${meaning}。這裡點出了${selectedKeywords[0]}的拉扯，以及${selectedKeywords[1]}需要被調整。`;
            } else if (position.name === '建議') {
                description = `${meaning}。可以考慮從${selectedKeywords[0]}的角度出發，並且注意${selectedKeywords[1]}。`;
            } else {
                description = `${meaning}。今天特別留意${selectedKeywords[0]}與${selectedKeywords[1]}。`;
            }

            return {
                card,
                orientation,
                position,
                description,
                keywords: selectedKeywords
            };
        }

        function summarize(interpretations, topic, question) {
            const topicInfo = TOPIC_LENS[topic];
            
            // Collect all keywords
            const allKeywords = [];
            interpretations.forEach(interp => {
                allKeywords.push(...interp.keywords);
            });

            // Get advice from the last card (or only card)
            const lastInterp = interpretations[interpretations.length - 1];
            const adviceKeywords = lastInterp.keywords;

            // Build summary
            let summary = topicInfo.prefix;
            
            if (interpretations.length === 1) {
                summary += `此刻的重點在於「${adviceKeywords[0]}」。你可以留意${adviceKeywords[1]}的面向，並保持開放的態度來面對當下的情況。`;
            } else {
                const themeKeywords = pickRandomFromArray(allKeywords, Math.min(3, allKeywords.length));
                summary += `綜合來看，${themeKeywords.join('、')}是這次解讀的核心主題。`;
                summary += `建議你從「${adviceKeywords[0]}」的方向思考，並且用${adviceKeywords[1]}的態度來面對挑戰。`;
                summary += `記住，塔羅提供的是一種可能的視角，真正的選擇權仍在你手中。`;
            }

            return summary;
        }

        function performReading(question, topic, spreadType) {
            const spread = SPREADS[spreadType];
            const cardCount = spread.positions.length;
            
            // Pick unique cards
            const selectedCards = pickUnique(CARDS, cardCount);
            
            // Create interpretations
            const interpretations = selectedCards.map((card, index) => {
                const orientation = getOrientation();
                const position = spread.positions[index];
                return interpretCard(card, orientation, position, topic);
            });

            // Generate summary
            const summary = summarize(interpretations, topic, question);

            return {
                question,
                topic,
                spread,
                interpretations,
                summary
            };
        }

        // ========================================
        // UI SECTION
        // ========================================

        let currentReading = null;

        function renderReading(reading) {
            const resultSection = document.getElementById('resultSection');
            const resultMeta = document.getElementById('resultMeta');
            const cardsContainer = document.getElementById('cardsContainer');
            const summarySection = document.getElementById('summarySection');

            // Show result section
            resultSection.classList.add('active');

            // Render meta information
            const topicLabel = TOPIC_LENS[reading.topic].label;
            const spreadLabel = reading.spread.name;
            
            let metaHTML = `
                <h3>抽牌結果</h3>
                <p><strong>主題：</strong>${topicLabel}</p>
                <p><strong>牌陣：</strong>${spreadLabel}</p>
            `;

            if (reading.question.trim()) {
                metaHTML += `<p><strong>問題：</strong>${reading.question}</p>`;
            } else {
                metaHTML += `
                    <div class="question-hint">
                        💡 你可以思考更具體的問題，例如：「接下來一個月我在${topicLabel}上需要注意什麼？」
                    </div>
                `;
            }

            resultMeta.innerHTML = metaHTML;

            // Render cards
            cardsContainer.innerHTML = reading.interpretations.map(interp => {
                const orientationText = interp.orientation === 'upright' ? '正位' : '逆位';
                const orientationClass = interp.orientation === 'upright' ? '' : 'reversed';
                
                return `
                    <div class="card-item">
                        <div class="card-position">${interp.position.name}</div>
                        <div class="card-name">${interp.card.nameZh}</div>
                        <div class="card-orientation ${orientationClass}">${orientationText}</div>
                        <div class="card-description">${interp.description}</div>
                    </div>
                `;
            }).join('');

            // Render summary
            summarySection.innerHTML = `
                <h3>整體解讀</h3>
                <p>${reading.summary}</p>
            `;

            // Scroll to result
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function handleDraw() {
            const question = document.getElementById('question').value;
            const topic = document.getElementById('topic').value;
            const spread = document.getElementById('spread').value;

            currentReading = performReading(question, topic, spread);
            renderReading(currentReading);
        }

        function handleReset() {
            // Clear form
            document.getElementById('question').value = '';
            document.getElementById('topic').value = 'love';
            document.getElementById('spread').value = 'one';

            // Hide result
            document.getElementById('resultSection').classList.remove('active');

            // Clear current reading
            currentReading = null;

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Initialize event listeners
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('drawBtn').addEventListener('click', handleDraw);
            document.getElementById('resetBtn').addEventListener('click', handleReset);
        });
    </script>
</body>
</html>
